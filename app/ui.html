<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Item Recommender</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#05070c;
    color:#e8edf5;
    min-height:100vh;
}

.app{
    max-width:1080px;
    margin:0 auto;
    padding:12px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    border-bottom:1px solid #1b2230;
    padding-bottom:8px;
}

.logo h1{
    font-size:20px;
    letter-spacing:0.5px;
    color:#f1c96b;
}

.status{
    font-size:11px;
    color:#9fd2ff;
    border:1px solid #1f3a54;
    background:#071521;
    padding:6px 10px;
    border-radius:999px;
}

.layout{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:10px;
    align-items:start;
}

.panel{
    background:#0b0f18;
    border:1px solid #1b2230;
    border-radius:14px;
    padding:14px;
}

.panel-title{
    font-size:12px;
    color:#8c96a8;
    text-transform:uppercase;
    letter-spacing:0.8px;
    margin-top:8px;
    margin-bottom:6px;
}

.panel-title:first-child{
    margin-top:0;
}

.compact-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.field{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.field.full{
    grid-column:1 / -1;
}

label{
    font-size:11px;
    color:#8c96a8;
    text-transform:uppercase;
    letter-spacing:0.4px;
}

input,
select{
    width:100%;
    padding:9px 10px;
    border-radius:8px;
    border:1px solid #252d3d;
    background:#070a11;
    color:#e8edf5;
    font-size:13px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#c89b3c;
    box-shadow:0 0 0 2px rgba(200,155,60,0.15);
}

.enemy-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.btn{
    width:100%;
    margin-top:12px;
    padding:11px;
    border:none;
    border-radius:9px;
    background:#c89b3c;
    color:#071017;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

.btn:hover{
    background:#e0b95a;
}

.more-btn{
    display:none;
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:9px;
    border:1px solid #2b3850;
    background:#101827;
    color:#f1c96b;
    font-weight:bold;
    cursor:pointer;
}

.more-btn:hover{
    background:#172238;
}

.results{
    display:none;
}

.best-card{
    background:linear-gradient(135deg,#101827,#0b0f18);
    border:1px solid #2b3850;
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
}

.kicker{
    font-size:11px;
    color:#8c96a8;
    text-transform:uppercase;
    letter-spacing:0.8px;
    margin-bottom:5px;
}

.best-item{
    font-size:24px;
    font-weight:bold;
    color:#f1c96b;
}

.recommendations{
    display:flex;
    flex-direction:column;
    gap:9px;
}

.item-card{
    background:#0b0f18;
    border:1px solid #1b2230;
    border-radius:12px;
    padding:12px;
}

.item-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
}

.rank{
    font-size:12px;
    color:#8c96a8;
}

.item-name{
    font-size:17px;
    font-weight:bold;
    color:#ffffff;
}

.item-title{
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
}

.item-icon{
    width:38px;
    height:38px;
    border-radius:6px;
    border:1px solid #2b3850;
    background:#070a11;
    cursor:pointer;
}

/* Tooltip */
.tooltip{
    position:absolute;
    bottom:120%;
    left:0;
    background:#111827;
    border:1px solid #2b3850;
    border-radius:8px;
    padding:10px;
    width:220px;
    font-size:12px;
    color:#e8edf5;
    display:none;
    z-index:10;
}

.item-title:hover .tooltip{
    display:block;
}

.score{
    font-size:11px;
    color:#f1c96b;
    border:1px solid rgba(241,201,107,0.3);
    background:rgba(241,201,107,0.08);
    padding:4px 7px;
    border-radius:999px;
    white-space:nowrap;
}

.reason{
    font-size:13px;
    line-height:1.4;
    color:#b8c0ce;
    margin-top:6px;
}

.error{
    margin-top:12px;
    background:#2a0d12;
    border:1px solid #70313d;
    padding:10px;
    border-radius:9px;
    color:#ffb7c0;
    font-size:13px;
}

.empty-state{
    min-height:390px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#7f8898;
    border:1px dashed #273044;
    border-radius:14px;
    padding:20px;
}

.confidence{
    font-size:12px;
    color:#8c96a8;
    line-height:1.1;
    white-space:nowrap;
}

@media(max-width:850px){
    .layout{
        grid-template-columns:1fr;
    }

    .compact-grid{
        grid-template-columns:1fr;
    }

    .enemy-grid{
        grid-template-columns:1fr;
    }

    .enemy-grid .field:last-child{
        grid-column:auto;
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div class="logo">
            <h1>LoL Item Recommender</h1>
        </div>
        <div class="status">MLP + Game Logic</div>
    </div>

    <div class="layout">

        <div class="panel">
            <div class="panel-title">Match State</div>

            <div class="compact-grid">
                <div class="field full">
                    <label>Your Champion</label>
                    <select id="champion" required>
                        <option value="">Select champion...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>

                <div class="field">
                    <label>Lane</label>
                    <select id="lane" required>
                        <option>TOP</option>
                        <option>JUNGLE</option>
                        <option value="MIDDLE">MID</option>
                        <option>BOTTOM</option>
                        <option>SUPPORT</option>
                    </select>
                </div>

                <div class="field">
                    <label>Stage</label>
                    <select id="time_bucket" required>
                        <option>early</option>
                        <option selected>mid</option>
                        <option>late</option>
                    </select>
                </div>

                <div class="field">
                    <label>KDA</label>
                    <input id="kda" placeholder="2/1/2">
                </div>

                <div class="field">
                    <label>Gold State</label>
                    <select id="gold">
                        <option value="3000">Far Ahead</option>
                        <option value="1500">Ahead</option>
                        <option value="0" selected>Even</option>
                        <option value="-1500">Behind</option>
                        <option value="-3000">Far Behind</option>
                    </select>
                </div>

                <div class="field">
                    <label>Winning</label>
                    <select id="win">
                        <option value="1" selected>Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
            </div>

            <div class="panel-title">Enemy Team</div>

            <div class="enemy-grid">
                <div class="field">
                    <label>Enemy 1</label>
                    <select id="enemy_1" required>
                        <option value="" selected disabled>Select...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>

                <div class="field">
                    <label>Enemy 2</label>
                    <select id="enemy_2" required>
                        <option value="" selected disabled>Select...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>

                <div class="field">
                    <label>Enemy 3</label>
                    <select id="enemy_3" required>
                        <option value="" selected disabled>Select...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>

                <div class="field">
                    <label>Enemy 4</label>
                    <select id="enemy_4" required>
                        <option value="" selected disabled>Select...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>

                <div class="field">
                    <label>Enemy 5</label>
                    <select id="enemy_5" required>
                        <option value="" selected disabled>Select...</option>
                        {{CHAMPION_OPTIONS}}
                    </select>
                </div>
            </div>

            <button class="btn" onclick="predict()">Recommend Items</button>

            <div id="errorBox"></div>
        </div>

        <div class="panel">
            <div id="emptyState" class="empty-state">
                Enter a match state to generate item recommendations.
            </div>

            <div class="results" id="results">
                <div class="best-card">
                    <div class="kicker">Best Item</div>
                    <div class="best-item" id="bestItem"></div>
                </div>

                <div class="panel-title">Top Recommendations</div>
                <div class="recommendations" id="top3"></div>
                <button class="more-btn" id="showMoreBtn" onclick="showMoreItems()">Show more items</button>
            </div>
        </div>

    </div>

</div>

<script>
let allRecommendations = [];
let visibleRecommendationCount = 3;

function renderRecommendations(){
    const itemsToShow = allRecommendations.slice(0, visibleRecommendationCount);
    const maxAdjustedScore = Math.max(
        ...allRecommendations.map(item => item.adjusted_score || 0),
        0
    );

    let html = "";

    itemsToShow.forEach((item,index)=>{

        const rawProb = item.prob || 0;
        const modelPct = Math.max(1, Math.round(rawProb * 100));
        const adjustedScore = item.adjusted_score || 0;
        const strengthPct = maxAdjustedScore > 0
            ? Math.max(1, Math.round((adjustedScore / maxAdjustedScore) * 100))
            : 1;

        html += `
        <div class="item-card">
            <div class="item-top">
                <div>
                    <div class="rank">#${index + 1}</div>
                    <div class="item-title">
                        <<div class="item-title">
                            <img class="item-icon" src="${item.icon || ""}" onerror="this.style.display='none'">

                            <div class="item-name">${item.item}</div>

                            <div class="tooltip">
                                <div><strong>${item.item}</strong></div>
                                <div>${item.details?.description || "No description"}</div>
                                <br>
                                <div>Cost: ${item.details?.cost ?? "?"}</div>
                                <div>Sell: ${item.details?.sell ?? "?"}</div>
                                <div>Tags: ${(item.details?.tags || []).join(", ")}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="score-wrap">
                    <div class="score">${strengthPct}% recommendation strength</div>
                    <div class="confidence">${modelPct}% model confidence</div>
                </div>
            </div>
            <div class="reason">${item.reason || ""}</div>
        </div>
        `;
    });

    document.getElementById("top3").innerHTML = html;

    const showMoreBtn = document.getElementById("showMoreBtn");
    if(allRecommendations.length > visibleRecommendationCount){
        const remaining = allRecommendations.length - visibleRecommendationCount;
        showMoreBtn.style.display = "block";
        showMoreBtn.innerText = `Show ${remaining} more item${remaining === 1 ? "" : "s"}`;
    }else{
        showMoreBtn.style.display = "none";
    }
}

function showMoreItems(){
    visibleRecommendationCount = allRecommendations.length;
    renderRecommendations();
}

async function predict(){

    document.getElementById("results").style.display = "none";
    document.getElementById("emptyState").style.display = "flex";
    document.getElementById("errorBox").innerHTML = "";
    document.getElementById("showMoreBtn").style.display = "none";
    allRecommendations = [];
    visibleRecommendationCount = 3;

    const requiredIds = [
        "champion",
        "lane",
        "time_bucket",
        "enemy_1",
        "enemy_2",
        "enemy_3",
        "enemy_4",
        "enemy_5"
    ];

    for(const id of requiredIds){
        const field = document.getElementById(id);
        if(!field.value){
            document.getElementById("errorBox").innerHTML =
                `<div class="error">Please complete all champion, lane, stage, and enemy selections.</div>`;
            field.focus();
            return;
        }
    }

    const champion = document.getElementById("champion").value;
    const enemies = [
        document.getElementById("enemy_1").value,
        document.getElementById("enemy_2").value,
        document.getElementById("enemy_3").value,
        document.getElementById("enemy_4").value,
        document.getElementById("enemy_5").value
    ];

    if(enemies.includes(champion)){
        document.getElementById("errorBox").innerHTML =
            `<div class="error">Your champion cannot also be on the enemy team.</div>`;
        return;
    }

    if(new Set(enemies).size !== enemies.length){
        document.getElementById("errorBox").innerHTML =
            `<div class="error">Enemy team cannot contain duplicate champions.</div>`;
        return;
    }

    const data = {
        champion: champion,
        lane: document.getElementById("lane").value,
        time_bucket: document.getElementById("time_bucket").value,
        kda: document.getElementById("kda").value || "0/0/0",
        gold: Number(document.getElementById("gold").value || 0),
        win: Number(document.getElementById("win").value || 0),

        cs: 0,
        vision: 0,

        enemy_1: enemies[0],
        enemy_2: enemies[1],
        enemy_3: enemies[2],
        enemy_4: enemies[3],
        enemy_5: enemies[4]
    };

    try{
        const response = await fetch("/predict",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const result = await response.json();

        if(result.error){
            const details = Array.isArray(result.details)
                ? result.details.join("<br>")
                : result.error;
            document.getElementById("errorBox").innerHTML =
                `<div class="error">${details}</div>`;
            return;
        }

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("results").style.display = "block";
        document.getElementById("bestItem").innerText = result.prediction;

        allRecommendations = result.recommendations || result.top3 || [];
        visibleRecommendationCount = 3;
        renderRecommendations();

    }catch(err){
        document.getElementById("errorBox").innerHTML =
            `<div class="error">${err.message}</div>`;
    }
}
</script>

</body>
</html>
