<!doctype html>
<html>
<head>
  <title>LoL Item Recommender</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #0a0a0a; color: #c8aa6e; }
    h2 { color: #c8aa6e; }
    input, select { width: 100%; padding: 8px; margin: 6px 0 14px; background: #1a1a2e; color: white; border: 1px solid #c8aa6e; border-radius: 4px; }
    button { background: #c8aa6e; color: black; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    pre { background: #1a1a2e; padding: 16px; border-radius: 4px; color: #00ff88; margin-top: 20px; }
    label { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <h2>⚔️ LoL Item Recommender</h2>

  <label>Champion Name</label>
  <input id="champion" placeholder="e.g. Jinx">

  <label>Lane</label>
  <select id="lane">
    <option>TOP</option>
    <option>JUNGLE</option>
    <option>MID</option>
    <option>BOTTOM</option>
    <option>SUPPORT</option>
  </select>

  <label>Game Stage</label>
  <select id="time_bucket">
    <option>early</option>
    <option>mid</option>
    <option>late</option>
  </select>

  <label>KDA (e.g. 3/1/5)</label>
  <input id="kda" placeholder="kills/deaths/assists">

  <label>Gold Difference</label>
  <input id="gold_diff" type="number" placeholder="e.g. 1500">

  <label>Win (1 = winning, 0 = losing)</label>
  <select id="win">
    <option value="1">Winning</option>
    <option value="0">Losing</option>
  </select>

  <button onclick="predict()">Get Recommendation</button>
  <pre id="out"></pre>

  <script>
    async function predict() {
      const data = {
        champion: document.getElementById("champion").value,
        lane: document.getElementById("lane").value,
        time_bucket: document.getElementById("time_bucket").value,
        kda: document.getElementById("kda").value,
        gold_diff: Number(document.getElementById("gold_diff").value),
        win: Number(document.getElementById("win").value)
      };
      const r = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      const j = await r.json();
      document.getElementById("out").innerText = JSON.stringify(j, null, 2);
    }
  </script>
</body>
</html>
